# AeroSpace Configuration
# Using alt (option) as mod key - matches your dotfiles

config-version = 2

start-at-login = true

# Normalizations - disable these that might be causing stacking issues
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# Accordion layout
accordion-padding = 1

# Default layout - tiles works like dwindle when you manually split
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Focus follows mouse
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

exec-on-workspace-change = ['/bin/bash', '-c', 'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE']

# Gaps (inner=between windows, outer=monitor edges)
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 10
outer.right = 10
outer.bottom = 8
outer.top = 18

# Key mapping
[key-mapping]
preset = 'qwerty'

[mode.main.binding]
# App Launching
#cmd-alt-ctrl-shift-t = 'exec-and-forget kitty'
#cmd-alt-ctrl-shift-b = 'exec-and-forget open -n -a Zen'
#cmd-alt-ctrl-shift-n = 'exec-and-forget open -n -a Kitty --args -e nvim'
#cmd-alt-ctrl-shift-m = 'exec-and-forget open -a Messages'
#alt-shift-m = 'exec-and-forget open -a Mail'

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Navigation (vim style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Floating toggle (Hyprland style)
alt-w = 'layout floating tiling'

# Launcher (Spotlight/Raycast)
#cmd-alt-ctrl-shift-d = 'exec-and-forget osascript -e "tell application \"System Events\" to keystroke space using {command down}"'

# Fullscreen
alt-f = 'fullscreen'

# Close
alt-q = 'close'

# Moving Windows (with shift)
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# System
alt-shift-r = 'reload-config'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'


alt-o = 'move-workspace-to-monitor --wrap-around next'

# Service mode for floating/tiling
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']
