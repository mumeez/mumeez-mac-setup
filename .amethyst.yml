# Amethyst configuration
# Mod keys: mod1 = alt, mod2 = hyperkey (caps lock)

mod1:
  - option

mod2:
  - option
  - control
  - shift
  - command

layouts:
  - tall
  - wide
  - fullscreen
  - column

cycle-layout:
  mod: mod1
  key: space

cycle-layout-backwards:
  mod: mod1
  key: shift-space

focus-ccw:
  mod: mod1
  key: j

focus-cw:
  mod: mod1
  key: k

swap-ccw:
  mod: mod1
  key: h

swap-cw:
  mod: mod1
  key: l

swap-screen-ccw:
  mod: mod2
  key: j

swap-screen-cw:
  mod: mod2
  key: l

throw-space-left:
  mod: mod2
  key: left

throw-space-right:
  mod: mod2
  key: right

shrink-main:
  mod: mod1
  key: i

expand-main:
  mod: mod1
  key: o

focus-main:
  mod: mod1
  key: enter

swap-main:
  mod: mod1
  key: m

toggle-floating:
  mod: mod1
  key: w

select-tall-layout:
  mod: mod1
  key: a

select-wide-layout:
  mod: mod1
  key: s

select-fullscreen-layout:
  mod: mod1
  key: d

display-current-layout:
  mod: mod1
  key: y

toggle-tiling:
  mod: mod2
  key: n

reevaluate-windows:
  mod: mod1
  key: z

toggle-focus-follows-mouse:
  mod: mod2
  key: x

relaunch-amethyst:
  mod: mod1
  key: r

close:
  mod: mod1
  key: q

fullscreen:
  mod: mod1
  key: f

throw-space-1:
  mod: mod1
  key: '1'

throw-space-2:
  mod: mod1
  key: '2'

throw-space-3:
  mod: mod1
  key: '3'

throw-space-4:
  mod: mod1
  key: '4'

throw-space-5:
  mod: mod1
  key: '5'

throw-space-6:
  mod: mod1
  key: '6'

throw-space-7:
  mod: mod1
  key: '7'

throw-space-8:
  mod: mod1
  key: '8'

throw-space-9:
  mod: mod1
  key: '9'

throw-space-10:
  mod: mod1
  key: '0'